<!DOCTYPE html>
<html>
<head>
  <title>Analytics - WatchmyAQ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP BANNER -->
  <div class="top-banner">WatchmyAQ</div>

  <!-- NAV BAR -->
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="about.html">About</a>
    <a href="design.html">Info</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- PAGE CONTENT -->
<div class="container">

  <h1>Analytics</h1>

  <h2 class="analytics-heading">Current Conditions</h2>

  <div class="analytics-grid">

    <div class="stat-card">
      <h3>Active Points</h3>
      <div id="activePoints" class="stat-number">--</div>
    </div>

    <div class="stat-card">
      <h3>Current Avg PM2.5</h3>
      <div id="currentAvg" class="stat-number">--</div>
    </div>

    <div class="stat-card">
      <h3>Current Lowest PM2.5</h3>
      <div id="currentBest" class="stat-number">--</div>
    </div>

    <div class="stat-card">
      <h3>Current Highest PM2.5</h3>
      <div id="currentWorst" class="stat-number">--</div>
    </div>

  </div>

  <h2 class="analytics-heading">Historical Statistics</h2>

  <div class="analytics-grid">

    <div class="stat-card">
      <h3>Total Readings</h3>
      <div id="totalReadings" class="stat-number">--</div>
    </div>

    <div class="stat-card">
      <h3>Days Monitored</h3>
      <div id="daysMonitored" class="stat-number">--</div>
    </div>

    <div class="stat-card">
      <h3>Historical Avg PM2.5</h3>
      <div id="historicalAvg" class="stat-number">--</div>
    </div>

    <div class="stat-card">
      <h3>Highest PM1.0 Ever</h3>
      <div id="historicalWorst" class="stat-number">--</div>
    </div>

  </div>

</div>

  <script src="script.js"></script>

</body>
</html>
