<!DOCTYPE html>
<html>
<head>
  <title>BreathSafeSTL</title>

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet (KEEP for now) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ❌ REMOVE heat plugin (we are not using it anymore) -->
</head>

<body>

  <!-- TOP BANNER -->
  <div class="top-banner">BreathSafeSTL</div>

  <!-- NAVBAR -->
 <div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="design.html">Info</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- PM TOGGLE (RIGHT SIDE) -->
 <div class="pm-toggle">
  <div class="pm-title">PM Layers</div>

  <button data-pm="pm1" onclick="setPM('pm1')">PM1</button>
  <button data-pm="pm25" onclick="setPM('pm25')" class="active">PM2.5</button>
  <button data-pm="pm10" onclick="setPM('pm10')">PM10</button>
</div>

  <!-- 🌡 DATA TILES (LEFT SIDE DASHBOARD) -->
  <div id="data-panel">

    <div class="tile">
      <div class="label">TEMP</div>
      <div class="value" id="tempTile">--</div>
    </div>

    <div class="tile">
      <div class="label">WEATHER</div>
      <div class="value" id="weatherTile">--</div>
    </div>

    <div class="tile">
      <div class="label">UV INDEX</div>
      <div class="value" id="uvTile">--</div>
    </div>

    <div class="tile">
      <div class="label">AQI</div>
      <div class="value" id="aqTile">--</div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- SCRIPT LAST -->
  <script src="script.js"></script>

</body>
</html>
